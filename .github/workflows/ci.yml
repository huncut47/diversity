name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  report:
    name: Build and save report
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Install Pandoc + LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pandoc \
            texlive-xetex \
            texlive-latex-extra \
            texlive-fonts-recommended \
            fonts-dejavu
      - name: Create build directory
        run: mkdir -p report/build
      - name: Generate report
        run: |
          pandoc \
            report/test1.tex \
            report/test2.md \
            --toc \
            --number-sections \
            --pdf-engine=xelatex \
            -V geometry:margin=1in \
            -o report/build/report.pdf
      - name: Commit report PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add report/build/report.pdf
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update report.pdf [skip ci]"
            git push
          fi
  gofmt:
    name: Go format check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gofumpt
        run: go install mvdan.cc/gofumpt@latest

      - name: Check formatting
        run: |
          diff=$(gofumpt -l .)
          if [ -n "$diff" ]; then
            echo "These files are not formatted with gofumpt:"
            echo "$diff"
            exit 1
          fi

  golangci:
    name: Go lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          args: --timeout=5m

  hadolint:
    name: Dockerfile lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.2.0
        with:
          dockerfile: Dockerfile

  codeql:
    name: CodeQL security scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Run analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:go"

  image_scan:
    name: Image vulnerability scan
    runs-on: ubuntu-latest
    needs: [hadolint]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t minitwit:${{ github.sha }} .

      - name: Run Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: minitwit:${{ github.sha }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          vuln-type: os,library

  integration_test:
    name: Integration testing of API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run integration tests
        env:
          SESSION_AUTH_KEY: ${{ secrets.SESSION_AUTH_KEY }}
          SESSION_ENCRYPTION_KEY: ${{ secrets.SESSION_ENCRYPTION_KEY }}
          AUTH_KEY: ${{ secrets.AUTH_KEY }}
        run: go test ./tests/integration/...

  uitest:
    name: UI & E2E Tests
    runs-on: ubuntu-latest
    needs: [gofmt, golangci, hadolint, integration_test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build minitwit image
        run: docker build -t minitwit:latest .

      - name: Init Docker Swarm
        run: docker swarm init

      - name: Run UI tests
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
          SESSION_AUTH_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          SESSION_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef
        run: docker compose up web database uitest --scale web=1 --scale uitest=1 --build --abort-on-container-exit --exit-code-from uitest

      - name: Tear down
        if: always()
        run: docker compose down web database uitest -v

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [gofmt, golangci, hadolint, uitest, codeql, image_scan]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd diversity
            set -a
            source .env
            set +a
            git pull
            docker build -t minitwit:latest .
            docker stack deploy -c docker-compose.yml diversity
            docker service update --force --image minitwit:latest diversity_web
  