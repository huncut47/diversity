name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gofmt:
    name: Go format check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gofumpt
        run: go install mvdan.cc/gofumpt@latest

      - name: Check formatting
        run: |
          diff=$(gofumpt -l .)
          if [ -n "$diff" ]; then
            echo "These files are not formatted with gofumpt:"
            echo "$diff"
            exit 1
          fi

  golangci:
    name: Go lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          args: --timeout=5m

  hadolint:
    name: Dockerfile lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.2.0
        with:
          dockerfile: Dockerfile

  integration_test:
    name: Integration testing of API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      
      - name: Run integration tests
        run: go test ./tests/integration/...

  uitest:
    name: UI & E2E Tests
    runs-on: ubuntu-latest
    needs: [gofmt, golangci, hadolint, integration_test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build minitwit image
        run: docker build -t minitwit:latest .

      - name: Init Docker Swarm
        run: docker swarm init

      - name: Run UI tests
        run: docker compose --profile test up --build --abort-on-container-exit --exit-code-from uitest

      - name: Tear down
        if: always()
        run: docker compose --profile test down -v

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [gofmt, golangci, hadolint, uitest]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: minitwit_deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            cd diversity
            git pull
            docker build -t minitwit:latest .
            docker stack deploy -c docker-compose.yml diversity
