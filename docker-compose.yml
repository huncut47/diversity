version: "3.9"

services:
  # caddy:
  #   image: caddy:latest
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   env_file:
  #     - .env
  #   volumes:
  #     - ./Caddyfile:/etc/caddy/Caddyfile

  web:
    build: .
    depends_on:
      - database
    restart: always
    ports:
      - "80:3000"
    volumes:
      - ./data:/app/data

  database:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: minitwit
      POSTGRES_PASSWORD: minitwit
      POSTGRES_DB: minitwit
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data: